<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>论文阅读室</title>
<style>
:root{
  --bg:#f6f4ef;
  --card:#fffdf9;
  --ink:#2c2a26;
  --muted:#8d8778;
  --line:#e7e2d6;
  --accent:#a5533b;
  --accent-soft:#f3e5df;
  --side-bg:#23262d;
  --side-ink:#c9cdd6;
  --side-muted:#7d828e;
  --side-active:#2e323b;
  --serif:"Noto Serif SC","Songti SC","STSong",Georgia,serif;
  --sans:-apple-system,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans)}

/* ---------- 侧栏 ---------- */
.sidebar{
  position:fixed;inset:0 auto 0 0;width:300px;
  background:var(--side-bg);color:var(--side-ink);
  display:flex;flex-direction:column;
}
.brand{padding:26px 24px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand h1{margin:0;font:600 19px/1.3 var(--serif);color:#f0ede6;letter-spacing:.06em}
.brand p{margin:7px 0 0;font-size:12px;color:var(--side-muted);letter-spacing:.04em}
.searchbox{padding:14px 16px 8px}
.searchbox input{
  width:100%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:var(--side-ink);font-size:13px;outline:none;
}
.searchbox input::placeholder{color:var(--side-muted)}
.searchbox input:focus{border-color:rgba(255,255,255,.28)}
.nav{flex:1;overflow-y:auto;padding:8px 10px 20px}
.nav::-webkit-scrollbar{width:6px}
.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:3px}
.nav-item{
  display:block;padding:11px 14px;margin:2px 0;border-radius:9px;
  text-decoration:none;color:var(--side-ink);border-left:2px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,.05)}
.nav-item.active{background:var(--side-active);border-left-color:var(--accent);color:#fff}
.nav-title{display:block;font:500 14px/1.45 var(--sans)}
.nav-sub{display:block;margin-top:3px;font-size:11.5px;color:var(--side-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-foot{padding:14px 24px;border-top:1px solid rgba(255,255,255,.07);
  font-size:11.5px;color:var(--side-muted)}

/* ---------- 主区 ---------- */
.main{margin-left:300px;min-height:100vh;padding:48px 56px 80px}
.paper{max-width:820px;margin:0 auto}
.paper[hidden]{display:none}
.paper-head{padding-bottom:8px}
.paper-head h1{margin:0 0 10px;font:600 30px/1.35 var(--serif)}
.orig-title{margin:0 0 14px;font-size:15px;color:var(--muted);font-style:italic}
.meta-line{margin:0;font-size:13px;color:var(--muted);letter-spacing:.02em}
.tagrow{margin:14px 0 0}
.tag{display:inline-block;margin:0 6px 6px 0;padding:3px 11px;border-radius:999px;
  background:var(--accent-soft);color:var(--accent);font-size:12px}

/* 标签页 */
.tabs{display:flex;gap:4px;margin:26px 0 0;border-bottom:1px solid var(--line)}
.tab{appearance:none;border:none;background:none;cursor:pointer;
  padding:10px 18px;font:500 14.5px var(--sans);color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.pane{display:none;padding-top:8px}
.pane.active{display:block}

/* 文章排版 */
.prose{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:38px 46px;margin-top:22px;
  font-family:var(--serif);font-size:16.5px;line-height:1.95;
  box-shadow:0 1px 3px rgba(60,50,30,.05);
}
.prose h2{font:600 21px/1.5 var(--serif);margin:2.1em 0 .7em;
  padding-bottom:.35em;border-bottom:1px solid var(--line)}
.prose h2:first-child{margin-top:0}
.prose h3{font:600 17.5px/1.5 var(--serif);margin:1.7em 0 .5em}
.prose p{margin:.9em 0;text-align:justify}
.prose ul,.prose ol{padding-left:1.6em;margin:.9em 0}
.prose li{margin:.45em 0}
.prose strong{color:var(--accent)}
.prose code{font-family:ui-monospace,Menlo,monospace;font-size:.87em;
  background:#f1ede3;padding:.12em .4em;border-radius:4px}
.prose blockquote{margin:1.2em 0;padding:.7em 1.2em;color:#6d675a;
  border-left:3px solid var(--accent);background:#faf7f0;border-radius:0 8px 8px 0;
  font-size:.94em}
.prose blockquote.figure{border-left-color:#b8b1a0}
.prose table{border-collapse:collapse;width:100%;margin:1.3em 0;font-size:.9em;
  font-family:var(--sans)}
.prose th,.prose td{border:1px solid var(--line);padding:.55em .8em;text-align:left}
.prose th{background:#f3efe5}
.prose .note{color:var(--muted);font-size:.9em}
.prose a{color:var(--accent)}

/* 空状态 */
.empty{max-width:520px;margin:18vh auto 0;text-align:center;color:var(--muted)}
.empty h2{font:600 22px var(--serif);color:var(--ink)}

@media (max-width:900px){
  .sidebar{position:static;width:auto;height:auto}
  .nav{max-height:40vh}
  .main{margin-left:0;padding:28px 18px 60px}
  .prose{padding:26px 22px}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <h1>论文阅读室</h1>
    <p>共 {{COUNT}} 篇 · 更新于 {{UPDATED}}</p>
  </div>
  <div class="searchbox">
    <input id="filter" type="search" placeholder="筛选论文…" autocomplete="off">
  </div>
  <nav class="nav" id="nav">
{{NAV}}
  </nav>
  <div class="side-foot">Paper Digest · 由 Claude Code 整理</div>
</aside>

<main class="main">
{{SECTIONS}}
  <div class="empty" id="empty" hidden>
    <h2>书架还空着</h2>
    <p>把论文 PDF 放进目录,让 Claude 处理即可。</p>
  </div>
</main>

<script>
(function(){
  var items=[].slice.call(document.querySelectorAll('.nav-item'));
  var papers=[].slice.call(document.querySelectorAll('.paper'));
  if(!papers.length){document.getElementById('empty').hidden=false;return;}

  function show(slug){
    var found=false;
    papers.forEach(function(p){
      var on=p.dataset.slug===slug;p.hidden=!on;if(on)found=true;
    });
    items.forEach(function(a){a.classList.toggle('active',a.dataset.slug===slug);});
    if(!found){papers[0].hidden=false;items[0].classList.add('active');}
    window.scrollTo(0,0);
  }
  items.forEach(function(a){
    a.addEventListener('click',function(e){
      e.preventDefault();
      history.replaceState(null,'','#'+a.dataset.slug);
      show(a.dataset.slug);
    });
  });
  window.addEventListener('hashchange',function(){
    show(decodeURIComponent(location.hash.slice(1)));
  });

  // 标签页
  document.querySelectorAll('.paper').forEach(function(p){
    p.querySelectorAll('.tab').forEach(function(t){
      t.addEventListener('click',function(){
        p.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
        p.querySelectorAll('.pane').forEach(function(x){x.classList.remove('active');});
        t.classList.add('active');
        p.querySelector('.pane-'+t.dataset.pane).classList.add('active');
      });
    });
  });

  // 侧栏筛选
  document.getElementById('filter').addEventListener('input',function(){
    var q=this.value.trim().toLowerCase();
    items.forEach(function(a){
      a.style.display=a.textContent.toLowerCase().indexOf(q)>=0?'':'none';
    });
  });

  show(decodeURIComponent(location.hash.slice(1))||papers[0].dataset.slug);
})();
</script>
<script>
window.MathJax={tex:{inlineMath:[['\\(','\\)']],displayMath:[['\\[','\\]']]},options:{skipHtmlTags:['script','noscript','style','textarea','pre','code']}};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
